  h+=`<div class="info-card" style="border-color:#333;margin-top:8px">
    <div class="info-title" style="color:#aaa">⚠️ חשיבות הירקות</div>
    <div class="info-text">ירקות מהווים חלק מרכזי בתזונה. מעבר לוויטמינים, מינרלים וסיבים תזונתיים — רובם דלים מאוד בקלוריות ותופסים נפח במערכת העיכול, חשוב להקניית שובע. במידה ונחסיר מהכמות היומית המומלצת, אנו עשויים לחוש תופעות לוואי כמו נשירת שיער, חולשה ועייפות.</div>
  </div>`;
  return h;
}

function renderShopping(){
  let h="";
  Object.entries(SHOPPING).forEach(([cat,items])=>{
    const filt=q?items.filter(i=>i.includes(q)):items;
    if(!filt.length) return;
    const open=openShop[cat];
    h+=`<button class="section-btn${open?" open":""}" onclick="toggleShop('${cat.replace(/'/g,"\\'")}')">
      <span>${cat}</span>
      <span style="color:#666">${filt.length} פריטים ${open?"▲":"▼"}</span>
    </button>`;
    if(open){
      h+=`<div class="section-body"><div class="shop-tags">${filt.map(i=>`<span class="tag">${i}</span>`).join("")}</div></div>`;
    }
  });
  return h;
}
function toggleShop(c){openShop[c]=!openShop[c];render()}

function renderWorkout(){
  let h=`<div class="info-card" style="border-color:#4ede7c22;margin-bottom:12px">
    <div class="info-title" style="color:#4ede7c">📋 הנחיות תכנית האימונים</div>
    <div class="info-text">
<strong style="color:#f0f0f0">אימוני כוח:</strong> 3 אימונים בשבוע עם יום-יומיים מנוחה בין אימונים (לדוג': ב' + ד' + ו')<br>
<strong style="color:#f0f0f0">זמני מנוחה:</strong> לפחות 30 שניות ולא יותר מ-90 שניות בין סט לסט ובין תרגיל לתרגיל<br>
<strong style="color:#f0f0f0">משך אימון:</strong> 45-70 דקות<br>
<strong style="color:#f0f0f0">משקלי עבודה:</strong> ניסוי וטעייה — מצליחים יותר חזרות? להוסיף משקל. מטרה: חזרה אחרונה על גבול הבלתי אפשרי<br>
<strong style="color:#f0f0f0">סדר תרגילים:</strong> תמיד מהשרירים הגדולים לקטנים — להתחיל מלמעלה ולרדת למטה<br>
<strong style="color:#f0f0f0">אירובי:</strong> 120 דקות בשבוע כולל, ניתן לפצל. לא לבצע לפני אימון כוח (הפרש מינ' 4-5 שעות) ולא על בטן ריקה
    </div>
  </div>`;

  WORKOUT_GROUPS.forEach(g=>{
    h+=`<div class="group-header" style="color:${g.c}">${g.g}</div>`;
    g.exs.forEach(e=>{
      h+=`<div class="workout-ex" style="border-right:3px solid ${g.c}">
        <div class="ex-header">
          <div class="ex-name">${e.n}</div>
          <div class="ex-sets">${e.s}</div>
        </div>
        <div class="ex-desc">${e.d}</div>
      </div>`;
    });
  });
  return h;
}

function renderCardio(){
  let h=`<div class="info-card" style="border-color:#ffc05533;margin-bottom:12px">
    <div class="info-title" style="color:#ffc055">🏃 אירובי ביתי ללא פציעות</div>
    <div class="info-text">
<strong style="color:#f0f0f0">מטרת האימון:</strong> העלאת דופק והתשה<br>
<strong style="color:#f0f0f0">משך אימון:</strong> כ-15-20 דקות<br>
<strong style="color:#f0f0f0">תדירות:</strong> עד 4 פעמים בשבוע, יש להפריד מאימוני כוח<br>
<strong style="color:#f0f0f0">סדר:</strong> תמיד מהשרירים הגדולים לקטנים — מהתחלת הגוף למטה<br>
<strong style="color:#f0f0f0">חשוב:</strong> לצפות בסרטון המדגים לפני ביצוע. במידה וביצוע גורם לכאב באזור פציעה — להפסיק מיד ולעדכן.
    </div>
  </div>`;

  CARDIO_EXS.forEach((e,i)=>{
    h+=`<div class="cardio-item">
      <div class="cardio-name">${i+1}. ${e.n}</div>
